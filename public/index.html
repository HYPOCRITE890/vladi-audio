<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vladi Audio | Booking System</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        header { background: #333; color: white; padding: 15px; text-align: center; border-radius: 8px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; text-align: center; }
        button { cursor: pointer; padding: 10px 15px; border: none; border-radius: 5px; }
        .btn-book { background: #28a745; color: white; }
        .btn-delete { background: #dc3545; color: white; margin-top: 10px; }
        nav { margin-bottom: 20px; text-align: center; }
        nav button { margin: 5px; background: #007bff; color: white; }
    </style>
</head>
<body>

<header>
    <h1>Vladi Audio Section</h1>
    <p>Premium Sound System Rentals</p>
</header>

<div class="container">
    <nav id="category-nav">
        <button onclick="loadItems('Wedding')">Weddings</button>
        <button onclick="loadItems('Concert')">Concerts</button>
        <button onclick="loadItems('Birthday')">Birthdays</button>
        <button onclick="loadAdmin()">Admin View</button>
    </nav>

    <div id="main-content">
        <h2>Available Equipment</h2>
        <div id="items-grid" class="grid"></div>
    </div>
</div>

<script>
    // --- CLIENT: VIEW & BOOK --- [cite: 6]
    function loadItems(category) {
        document.getElementById('main-content').innerHTML = `<h2>${category} Packages</h2><div id="items-grid" class="grid"></div>`;
        fetch(`/api/items/${category}`)
            .then(res => res.json())
            .then(items => {
                const grid = document.getElementById('items-grid');
                items.forEach(item => {
                    grid.innerHTML += `
                        <div class="card">
                            <h3>${item.name}</h3>
                            <p>${item.description}</p>
                            <p><strong>₱${item.price}</strong></p>
                            <input type="date" id="date-${item._id}"><br><br>
                            <button class="btn-book" onclick="confirmBooking('${item._id}', '${item.name}')">Book Now</button>
                        </div>
                    `;
                });
            });
    }

    function confirmBooking(id, name) {
        const date = document.getElementById(`date-${id}`).value;
        if (!date) return alert("Please select a date!");

        // FEATURE: Confirmation Prompt [cite: 6]
        if (confirm(`Are you sure you want to rent the ${name} for ${date}?`)) {
            fetch('/api/book', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ item_id: id, date: date })
            }).then(() => alert("Booking Sent!"));
        }
    }

    // --- ADMIN: MANAGE BOOKINGS --- [cite: 6]
    function loadAdmin() {
        const password = prompt("Admin Password:");
        if (password !== "admin123") return alert("Access Denied");

        fetch('/api/admin/all-bookings')
            .then(res => res.json())
            .then(bookings => {
                let html = '<h2>Admin Dashboard</h2><table border="1" width="100%" cellpadding="10">';
                html += '<tr><th>Client</th><th>Item</th><th>Date</th><th>Action</th></tr>';
                bookings.forEach(b => {
                    html += `<tr>
                        <td>${b.username}</td>
                        <td>${b.name}</td>
                        <td>${b.booking_date}</td>
                        <td><button class="btn-delete" onclick="deleteBooking('${b._id}')">Delete</button></td>
                    </tr>`;
                });
                html += '</table>';
                document.getElementById('main-content').innerHTML = html;
            });
    }

    function deleteBooking(id) {
        if (confirm("Permanently delete this booking?")) {
            fetch(`/api/admin/delete-booking/${id}`, { method: 'DELETE' })
                .then(() => loadAdmin());
        }
    }
</script>

</body>
</html>
