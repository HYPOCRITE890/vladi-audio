<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VLADI AUDIO | Professional Sound Solutions</title>
    <style>
        /* --- PROFESSIONAL DESIGN (Bringing back the UI) --- */
        :root {
            --primary: #d4af37; /* Gold */
            --dark: #1a1a1a;
            --light: #f4f4f4;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); margin: 0; padding: 0; }
        
        header { 
            background: var(--dark); 
            color: var(--primary); 
            padding: 40px 20px; 
            text-align: center; 
            border-bottom: 4px solid var(--primary);
        }

        .nav-bar { background: #333; padding: 10px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        .nav-bar button { 
            background: transparent; color: white; border: 1px solid var(--primary); 
            padding: 8px 20px; margin: 5px; cursor: pointer; transition: 0.3s;
        }
        .nav-bar button:hover { background: var(--primary); color: black; }

        .container { max-width: 1100px; margin: 30px auto; padding: 20px; }

        .section-title { text-align: center; color: var(--dark); margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }

        /* Equipment Cards */
        .card { 
            background: white; border-radius: 12px; overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: transform 0.3s;
            border-top: 5px solid var(--primary);
        }
        .card:hover { transform: translateY(-10px); }
        .card-content { padding: 20px; }
        .card h3 { margin: 0; color: var(--dark); }
        .card p { color: #666; font-size: 14px; height: 40px; }
        .price { font-size: 22px; color: var(--dark); font-weight: bold; margin: 15px 0; }

        input[type="date"] { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 5px; }

        .btn-book { 
            width: 100%; background: var(--dark); color: var(--primary); 
            border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 5px;
        }
        .btn-book:hover { background: #333; }

        /* Admin Table Styling */
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
        th { background: var(--dark); color: var(--primary); padding: 15px; }
        td { padding: 15px; border-bottom: 1px solid #ddd; text-align: center; }
        .btn-delete { background: #ff4444; color: white; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer; }

    </style>
</head>
<body>

<header>
    <h1>VLADI AUDIO</h1>
    <p>Premium Sound System & Stage Production</p>
</header>

<div class="nav-bar">
    <button onclick="loadItems('Wedding')">Weddings</button>
    <button onclick="loadItems('Concert')">Concerts</button>
    <button onclick="loadItems('Birthday')">Birthdays</button>
    <button onclick="loadItems('Conference')">Conferences</button>
    <button onclick="loadAdmin()">Admin Dashboard</button>
</div>

<div class="container" id="view-container">
    <h2 class="section-title">Select an Event Category to Begin</h2>
    <div id="items-grid" class="grid">
        </div>
</div>

<script>
    // --- FEATURE: LOAD EQUIPMENT ---
    function loadItems(category) {
        const container = document.getElementById('view-container');
        container.innerHTML = `<h2 class="section-title">${category} Packages</h2><div id="items-grid" class="grid"></div>`;
        
        fetch(`/api/items/${category}`)
            .then(res => res.json())
            .then(items => {
                const grid = document.getElementById('items-grid');
                items.forEach(item => {
                    grid.innerHTML += `
                        <div class="card">
                            <div class="card-content">
                                <h3>${item.name}</h3>
                                <p>${item.description}</p>
                                <div class="price">₱${item.price.toLocaleString()}</div>
                                <label>Target Event Date:</label>
                                <input type="date" id="date-${item._id}">
                                <button class="btn-book" onclick="confirmAndBook('${item._id}', '${item.name}')">BOOK RESERVATION</button>
                            </div>
                        </div>
                    `;
                });
            });
    }

    // --- FEATURE: CLIENT CONFIRMATION POP-UP ---
    function confirmAndBook(itemId, itemName) {
        const date = document.getElementById(`date-${itemId}`).value;
        if (!date) return alert("Please select a date first!");

        if (confirm(`ARE YOU SURE?\n\nYou are booking: ${itemName}\nFor the date: ${date}\n\nClick OK to confirm.`)) {
            fetch('/api/book', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ item_id: itemId, date: date })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) alert("✅ Booking Success! Vladi Audio will contact you shortly.");
            });
        }
    }

    // --- FEATURE: ADMIN DELETE & VIEW ---
    function loadAdmin() {
        const pass = prompt("Enter Admin Access Code:");
        if (pass !== "admin123") return alert("Unauthorized Access");

        fetch('/api/admin/all-bookings')
            .then(res => res.json())
            .then(bookings => {
                let html = '<h2 class="section-title">Master Booking List</h2>';
                html += '<table><tr><th>Client</th><th>Equipment</th><th>Event Date</th><th>Management</th></tr>';
                bookings.forEach(b => {
                    html += `<tr>
                        <td>${b.username}</td>
                        <td>${b.name}</td>
                        <td>${b.booking_date}</td>
                        <td><button class="btn-delete" onclick="deleteBooking('${b._id}')">CANCEL/DELETE</button></td>
                    </tr>`;
                });
                html += '</table>';
                document.getElementById('view-container').innerHTML = html;
            });
    }

    function deleteBooking(id) {
        if (confirm("WARNING: This will permanently delete the client's reservation. Proceed?")) {
            fetch(`/api/admin/delete-booking/${id}`, { method: 'DELETE' })
                .then(() => loadAdmin());
        }
    }
</script>

</body>
</html>
